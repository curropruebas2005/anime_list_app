name: Compilar IPA (iOS) sin firma

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # Permite lanzar la compilación manualmente desde la pestaña Actions de GitHub

jobs:
  build:
    name: Compilar para iOS
    runs-on: macos-14
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Java (requerido para plugins compartidos)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Instalar dependencias de Flutter
        run: flutter pub get
        working-directory: anime_list_app

      - name: Configurar proyecto de iOS (Generar Podfile)
        run: flutter build ios --config-only --no-codesign
        working-directory: anime_list_app


      - name: Configurar Xcode para compilar sin firma (CI)
        run: |
          echo "CODE_SIGNING_ALLOWED = NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGNING_REQUIRED = NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGN_IDENTITY = -" >> ios/Flutter/Release.xcconfig
          echo "EXPANDED_CODE_SIGN_IDENTITY = -" >> ios/Flutter/Release.xcconfig
          
          python3 -c "
          with open('ios/Podfile', 'r') as f:
              content = f.read()
          modified = content.replace(
              'flutter_additional_ios_build_settings(target)',
              '''flutter_additional_ios_build_settings(target)
              target.build_configurations.each do |config|
                config.build_settings[\'CODE_SIGNING_ALLOWED\'] = \'NO\'
                config.build_settings[\'CODE_SIGNING_REQUIRED\'] = \'NO\'
                config.build_settings[\'CODE_SIGNING_IDENTITY\'] = \'-\'
                config.build_settings[\'EXPANDED_CODE_SIGN_IDENTITY\'] = \'-\'
              end'''
          )
          with open('ios/Podfile', 'w') as f:
              f.write(modified)
          "
        working-directory: anime_list_app

      - name: Re-ejecutar instalación de Pods con configuraciones sin firma
        run: |
          cd ios
          pod install --repo-update
        working-directory: anime_list_app

      - name: Compilar IPA (Sin firmar)
        run: flutter build ipa --no-codesign
        working-directory: anime_list_app

      - name: Subir archivo IPA como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: App-iOS-Sin-Firmar
          path: anime_list_app/build/ios/archive/Runner.xcarchive
          if-no-files-found: error
