name: Compilar IPA (iOS) sin firma

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # Permite lanzar la compilación manualmente desde la pestaña Actions de GitHub

jobs:
  build:
    name: Compilar para iOS
    runs-on: macos-14
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Java (requerido para plugins compartidos)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Instalar dependencias de Flutter
        run: flutter pub get
        working-directory: anime_list_app

      - name: Configurar Xcode para compilar sin firma (CI)
        run: |
          echo "CODE_SIGNING_ALLOWED = NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGNING_REQUIRED = NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGN_IDENTITY = -" >> ios/Flutter/Release.xcconfig
          echo "EXPANDED_CODE_SIGN_IDENTITY = -" >> ios/Flutter/Release.xcconfig
        working-directory: anime_list_app

      - name: Configurar proyecto de iOS (Ejecutar pod install)
        run: flutter build ios --config-only --no-codesign
        working-directory: anime_list_app

      - name: Compilar IPA (Sin firmar)
        run: flutter build ipa --no-codesign
        working-directory: anime_list_app

      - name: Empaquetar en archivo .ipa
        run: |
          mkdir -p build/ios/ipa/Payload
          cp -r build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r app-release.ipa Payload
        working-directory: anime_list_app

      - name: Subir archivo IPA como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: App-iOS-Sin-Firmar
          path: anime_list_app/build/ios/ipa/app-release.ipa
          if-no-files-found: error

